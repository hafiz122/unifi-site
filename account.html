  <nav class="navbar navbar-expand-lg navbar-dark sticky-top">

  <section>
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-5">
          <div class="card shadow-sm">
            <div class="card-body p-5">
              <h3 class="fw-bold text-center mb-4">Sign In</h3>
              <form onsubmit="event.preventDefault(); alert('Demo: Sign in not available.');">
                <div class="mb-3">
                  <label class="form-label small fw-semibold">Email</label>
                  <input type="email" class="form-control rounded-pill" placeholder="you@example.com" style="border-color:var(--brand-border);">
                </div>
                <div class="mb-3">
                  <label class="form-label small fw-semibold">Password</label>
                  <input type="password" class="form-control rounded-pill" placeholder="Enter password" style="border-color:var(--brand-border);">
                </div>
                <button type="submit" class="btn rounded-pill w-100 py-2 mb-3" style="background:var(--brand-red); color:#fff; font-weight:600;">Sign In</button>
              </form>
              <p class="text-center text-muted small mb-0">
                Don't have an account? <a href="#" onclick="event.preventDefault(); alert('Demo: Sign up not available.');" style="color:var(--brand-red);">Sign Up</a>
              </p>
            </div>
          </div>
          <p class="text-center text-muted small mt-3">Demo page. Authentication not enabled.</p>
        </div>
      </div>
